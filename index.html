<script>

const ENDPOINT = "https://script.google.com/macros/s/AKfycbylx3WJzDbbNf_v4kTLWR2EUY_eC0RqrrkWWFhCVQkT1Zt9_ymZjPklgP6uDvI-NFRFbg/exec";

let respostas = {};

function salvar(k,v){
  respostas[k]=v;
}

/* 🔥 ENVIO CORRETO */
function enviarDados(){

  fetch(ENDPOINT, {
    method: "POST",
    headers: {
      "Content-Type": "text/plain;charset=utf-8"
    },
    body: JSON.stringify(respostas)
  });

}

/* EXEMPLO FINAL */
function final(){

  enviarDados();

  document.getElementById("app").innerHTML = `
    <h1>🦆 Processando...</h1>
    <p>Os patos estão analisando suas respostas</p>
  `;

  setTimeout(()=>{

    document.getElementById("app").innerHTML = `
      <h1>❤️ Resultado</h1>

      <p>
      ☕ ${respostas.rolê}<br>
      📷 ${respostas.camera}<br>
      🌙 ${respostas.horario}<br>
      🌿 ${respostas.ambiente}<br>
      🎯 ${respostas.estilo}<br>
      😎 ${respostas.calvos}<br>
      🍪 ${respostas.snack}
      </p>

      <h2>🦆 Date aprovado pelos patos</h2>
    `;

  },2000);

}

</script>
